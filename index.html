<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Storefront Menu</title>
<style>
  body { font-family: monospace; background: #000; color: #0f0; margin: 0; padding: 10px; }
  #console { white-space: pre; }
  a { color: #0f0; text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>

<div id="console"></div>

<script>
const consoleEl = document.getElementById('console');
const apiKey = 'AIzaSyAi0maGeBp6sTbtp5ED3gqo9ZUGuh-Caes';

let menu = {};
let currentStorefront = 'Home Storefront';
let currentId = '';
const homeId = '1m99FhKG-zpNd7VoAOjFV11dyJsDbnUv9';

function print(text) {
  consoleEl.textContent += text + '\n';
}

function clearConsole() {
  consoleEl.textContent = '';
}

async function fetchFileFromDrive(fileId) {
  const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${apiKey}`;
  const response = await fetch(url);
  if (!response.ok) throw new Error('Network response was not ok');
  return await response.blob();
}

async function saveBlobAsFile(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function loadStorefront(id) {
  try {
    const data = await fetchFileFromDrive(id);
    const text = await data.text();
    menu = JSON.parse(text);
  } catch (e) {
    print('Error loading storefront: ' + e);
  }
}

function renderMenu(items) {
  const container = document.createElement('div');

  // Home button
  const homeBtn = document.createElement('button');
  homeBtn.textContent = '< home';
  homeBtn.onclick = () => {
    currentId = homeId;
    currentStorefront = 'Home Storefront';
    mainLoop();
  };
  container.appendChild(homeBtn);

  container.appendChild(document.createElement('br'));
  container.appendChild(document.createElement('br'));

  // Item buttons
  items.forEach((item, index) => {
    const btn = document.createElement('button');
    btn.textContent = `${index}: ${item}`;
    btn.onclick = () => handleSelection(index, items);
    container.appendChild(btn);
    container.appendChild(document.createElement('br'));
  });

  document.body.appendChild(container);
  return container;
}

async function handleSelection(index, items) {
  const itemName = items[index];
  const item = menu[itemName];

  if (item[1] === 'storefront') {
    currentId = item[0];
    currentStorefront = itemName;
    mainLoop();
  } else {
    clearConsole();
    print('Downloading...');
    try {
      const blob = await fetchFileFromDrive(item[0]);
      await saveBlobAsFile(blob, item[1]);
      print('Download successful.');
    } catch (e) {
      print('Download failed: ' + e);
    }

    // Button to return
    const backBtn = document.createElement('button');
    backBtn.textContent = 'Return to storefront';
    backBtn.onclick = () => mainLoop();
    document.body.appendChild(backBtn);
  }
}

async function mainLoop() {
  clearConsole();
  print(currentStorefront + ':\n');
  print('Loading...');

  await loadStorefront(currentId);

  clearConsole();
  print(currentStorefront + ':\n');

  const items = Object.keys(menu);

  // Remove old menu buttons
  document.querySelectorAll('div.menu-container').forEach(el => el.remove());

  const menuEl = renderMenu(items);
  menuEl.classList.add('menu-container');
}

mainLoop();
</script>
</body>
</html>
