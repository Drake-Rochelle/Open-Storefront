<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>

<body>

<pre id="terminal"></pre>

<div style="margin-top: 1em;">
  <input id="user_input" placeholder="Enter selection">
  <button id="submit">Submit</button>
</div>

<script type="py">
from pyodide.http import pyfetch
import json, os

# -----------------------------
# State
# -----------------------------
menu = {}
current_storefront = "Home Storefront"
storefront_id = "1m99FhKG-zpNd7VoAOjFV11dyJsDbnUv9"

# -----------------------------
# Helpers
# -----------------------------
from js import document

def term_write(text):
    document.getElementById("terminal").innerText = text

def clear():
    document.getElementById("terminal").innerText = ""

async def fetch_json(url):
    # Use a CORS proxy so Google Drive works
    proxy = "https://corsproxy.io/?"
    response = await pyfetch(proxy + url)
    return await response.text()

async def fetch_file(url):
    proxy = "https://corsproxy.io/?"
    response = await pyfetch(proxy + url)
    return await response.bytes()

# -----------------------------
# Storefront Logic
# -----------------------------
async def open_storefront(id):
    global menu
    url = f"https://drive.google.com/uc?export=download&id={id}"
    text = await fetch_json(url)
    menu = json.loads(text)

def draw_menu():
    clear()
    term_write(f"{current_storefront}:\n\n")
    if current_storefront != "Home Storefront":
        term_write("x: <home>\n")
    for i, key in enumerate(menu.keys()):
        term_write(f"{i}: {key}\n")

async def handle_selection(sel):
    global storefront_id, current_storefront

    if sel == "x" and current_storefront != "Home Storefront":
        storefront_id = "1m99FhKG-zpNd7VoAOjFV11dyJsDbnUv9"
        current_storefront = "Home Storefront"
        await load_storefront()
        return

    try:
        index = int(sel)
    except:
        term_write("\nInvalid selection.\n")
        return

    items = list(menu.keys())
    if index < 0 or index >= len(items):
        term_write("\nInvalid selection.\n")
        return

    item = menu[items[index]]

    if item[1] == "storefront":
        storefront_id = item[0]
        current_storefront = items[index]
        await load_storefront()
    else:
        await download_item(item)

async def download_item(item):
    clear()
    term_write("Downloading...\n")

    url = item[0]
    filename = item[1]

    data = await fetch_file(url)

    # Save into PyScript virtual FS
    with open(filename, "wb") as f:
        f.write(data)

    term_write(f"Download complete: {filename}\n")
    term_write("Press submit to return.\n")

async def load_storefront():
    clear()
    term_write("Loading...\n")
    await open_storefront(storefront_id)
    draw_menu()

# -----------------------------
# UI Event Binding
# -----------------------------
def on_submit(event):
    sel = document.getElementById("user_input").value
    document.getElementById("user_input").value = ""
    return handle_selection(sel)

document.getElementById("submit").addEventListener("click", on_submit)
# -----------------------------
# Start
# -----------------------------
import asyncio

async def main():
    await load_storefront()

asyncio.ensure_future(main())
</script>

</body>
</html>
